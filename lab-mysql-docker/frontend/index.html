<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <meta name="description" content="Página de cadastro de novos usuários. Crie sua conta preenchendo nome, email e senha." />
  <title>Cadastro de Usuários | Sistema</title>
  
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <h1>Cadastro</h1>
    <nav aria-label="Navegação para login">
      <p><a href="login.html">Ir para o Login</a></p>
    </nav>
  </header>
  
  <main class="layout" role="main">
    <section class="panel" style="margin: 0 auto; max-width: 500px" aria-labelledby="titulo-cadastro">
      <h2 id="titulo-cadastro">Novo Usuário</h2>
      
      <form id="usuario-form">
        <div class="field">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" required autocomplete="name" aria-required="true" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" aria-required="true" />
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required autocomplete="new-password" aria-required="true" />
        </div>
        <div class="actions">
          <button type="submit">Cadastrar</button>
        </div>
      </form>
      
      <p id="mensagem" class="mensagem" aria-live="polite" role="status"></p>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
