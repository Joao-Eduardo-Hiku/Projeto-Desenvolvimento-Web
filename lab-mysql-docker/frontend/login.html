<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <meta name="description" content="Página de login. Acesse sua conta informando seu email e senha cadastrados." />
  <title>Login | Sistema</title>
  
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <h1>Login</h1>
    <nav aria-label="Navegação para cadastro">
      <p><a href="index.html">Não tem conta? Cadastre-se</a></p>
    </nav>
  </header>
  
  <main class="layout" role="main">
    <section class="panel" style="margin: 0 auto; max-width: 400px;" aria-label="Formulário de acesso">
      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" aria-required="true" />
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required autocomplete="current-password" aria-required="true" />
        </div>
        <div class="actions">
          <button type="submit" style="width: 100%;">Entrar</button>
        </div>
      </form>
      
      <p id="mensagem" class="mensagem" aria-live="polite" role="status"></p>
    </section>
  </main>

  <div id="cookie-banner" class="cookie-banner" role="region" aria-label="Aviso de uso de cookies" style="display: none;">
    <p>
      Utilizamos cookies para melhorar a sua experiência e gerir a sua sessão.<br>
      Ao continuar a navegar, concorda com o uso de cookies
    </p>
    <button id="btn-aceitar-cookies" class="btn-cookie">Entendi</button>
  </div>

  <script src="./cookies.js"></script>
  <script src="./login.js"></script>
</body>
</html>
